<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="台灣網路認證考試複習系統 — 測驗模式與複習模式，高效備考。">
  <title>NetCert 網路認證複習系統</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+TC:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- ══ Navbar ══════════════════════════════════════════ -->
<nav class="navbar" id="navbar">
  <div class="nav-brand" id="nav-brand" onclick="app.navigateTo('dashboard')" role="button" tabindex="0">
    <div class="nav-logo">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="2" y1="12" x2="22" y2="12"/>
        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
      </svg>
    </div>
    <span class="nav-title">NetCert</span>
  </div>

  <div class="nav-actions">
    <button class="kbd-hint" id="kb-search-hint" title="搜尋類別"
      onclick="app.focusSearch()"
      style="cursor:pointer;background:none;border:none;font:inherit;">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:middle;margin-right:4px"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <span data-i18n="search_btn">搜尋</span>
    </button>
    <!-- Language toggle -->
    <div class="lang-toggle" id="lang-toggle" title="Switch language" role="group" aria-label="Language">
      <button class="lang-btn active" id="btn-lang-zh" onclick="app.setLang('zh')">中文</button>
      <button class="lang-btn" id="btn-lang-en" onclick="app.setLang('en')">EN</button>
    </div>
    <button class="btn-icon" id="btn-theme" title="切換主題" onclick="app.toggleTheme()">
      <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/>
        <line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/>
        <line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
      <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>
    <button class="btn-icon" title="首頁" onclick="app.navigateTo('dashboard')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
    </button>
  </div>
</nav>

<!-- ══ App ════════════════════════════════════════════ -->
<main class="app-container">

  <!-- ── Dashboard ──────────────────────────────── -->
  <section class="view" id="view-dashboard">

    <div class="dashboard-hero">
      <div class="hero-content">
        <div class="hero-eyebrow" data-i18n="hero_eyebrow">Taiwan Networking Certification</div>
        <h1 class="hero-title" data-i18n="hero_title">網路認證<br>複習系統</h1>
        <p class="hero-sub" data-i18n="hero_sub">選擇學習類別，開始您的考試備考之旅</p>
        <div class="hero-stats" id="hero-stats"></div>
        <div class="hero-cta">
          <button class="btn-start-all" id="btn-start-all" onclick="app.startAllQuestions('quiz')">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            <span data-i18n="btn_start_all">全部題目 — 開始測驗</span>
          </button>
          <button class="btn-start-all btn-start-review" id="btn-start-review-all" onclick="app.startAllQuestions('review')">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
            <span data-i18n="btn_start_review_all">全部題目 — 複習模式</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Search -->
    <div class="search-bar">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input class="search-input" id="search-input" type="text" placeholder="搜尋類別… (按 / 快速聚焦)" data-i18n-ph="search_ph" autocomplete="off">
    </div>

    <p class="section-label" data-i18n="section_label">學習類別</p>
    <div class="category-grid" id="category-grid"></div>

  </section>

  <!-- ── Category / Mode Select ─────────────────── -->
  <section class="view hidden" id="view-category">
    <div class="screen-header">
      <button class="btn-back" onclick="app.navigateTo('dashboard')">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        返回
      </button>
      <h2 class="screen-title" id="cat-screen-title"></h2>
      <p class="screen-sub" id="cat-screen-sub"></p>
    </div>

    <div class="mode-selector">
      <div class="mode-card quiz-mode" id="mode-quiz" onclick="app.startQuiz()" tabindex="0" onkeydown="if(event.key==='Enter')app.startQuiz()">
        <div class="mode-icon-wrap quiz-icon">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 11l3 3L22 4"/>
            <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
          </svg>
        </div>
        <h3>測驗模式</h3>
        <p>逐題作答，即時反饋與計時</p>
        <span class="mode-tag">Quiz Mode</span>
      </div>

      <div class="mode-card rev-mode" id="mode-review" onclick="app.startReview()" tabindex="0" onkeydown="if(event.key==='Enter')app.startReview()">
        <div class="mode-icon-wrap review-icon">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
            <line x1="8" y1="21" x2="16" y2="21"/>
            <line x1="12" y1="17" x2="12" y2="21"/>
          </svg>
        </div>
        <h3>複習模式</h3>
        <p>快速瀏覽答案，記憶強化</p>
        <span class="mode-tag">Review Mode</span>
      </div>
    </div>
  </section>

  <!-- ── Quiz View ───────────────────────────────── -->
  <section class="view hidden" id="view-quiz">

    <div class="quiz-header">
      <button class="btn-back" onclick="app.exitQuiz()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        結束
      </button>

      <div class="quiz-meta">
        <div class="quiz-progress-wrap">
          <div class="quiz-q-label" id="quiz-q-label">1 / 10</div>
          <div class="progress-bar"><div class="progress-fill" id="quiz-progress-fill"></div></div>
        </div>
      </div>

      <div class="quiz-pill">
        <span class="pill-correct" id="pill-correct">0</span>
        <span class="pill-slash">/</span>
        <span id="pill-total">0</span>
      </div>

      <div class="quiz-timer" id="quiz-timer">
        <svg class="timer-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 15"/>
        </svg>
        <span id="timer-display">30</span>s
      </div>

      <div class="streak-badge" id="streak-badge">🔥 0</div>
    </div>

    <div class="quiz-card" id="quiz-card">
      <div class="q-number" id="q-number">Q1</div>

      <div class="q-image-wrap hidden" id="q-image-wrap">
        <div class="image-placeholder" id="q-image-ph"></div>
      </div>

      <p class="q-text" id="q-text"></p>

      <div class="options-grid" id="options-grid"></div>

      <div class="explanation-box hidden" id="explanation-box">
        <div class="expl-header">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
          解析
        </div>
        <p id="expl-text"></p>
      </div>
    </div>

    <div class="quiz-nav">
      <span class="kbd-tip" data-i18n="kbd_tip">鍵盤：1-4 選答，→ 下一題，Esc 結束</span>
      <button class="btn-primary" id="btn-next" onclick="app.nextQuestion()" disabled>
        下一題
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>

  </section>

  <!-- ── Results View ────────────────────────────── -->
  <section class="view hidden" id="view-results">
    <div class="results-wrap">
      <div class="results-card">
        <div class="results-emoji" id="res-emoji">🎉</div>
        <h2 class="results-title" id="res-title">測驗完成！</h2>

        <div class="ring-wrap">
          <svg class="score-ring" viewBox="0 0 120 120">
            <circle class="ring-track" cx="60" cy="60" r="52.4" fill="none" stroke-width="9"/>
            <circle class="ring-fill" id="ring-fill" cx="60" cy="60" r="52.4" fill="none" stroke-width="9" transform="rotate(-90 60 60)"/>
          </svg>
          <div class="ring-text">
            <span class="ring-pct" id="res-pct">0%</span>
            <span class="ring-label">正確率</span>
          </div>
        </div>

        <div class="grade-band grade-a" id="res-grade">優秀</div>

        <div class="stat-row">
          <div class="stat-item"><span class="stat-val c" id="stat-correct">0</span><span class="stat-lbl">正確</span></div>
          <div class="stat-item"><span class="stat-val i" id="stat-incorrect">0</span><span class="stat-lbl">錯誤</span></div>
          <div class="stat-item"><span class="stat-val" id="stat-total">0</span><span class="stat-lbl">總題數</span></div>
          <div class="stat-item"><span class="stat-val" id="stat-streak" style="color:var(--gold)">0</span><span class="stat-lbl">最高連勝</span></div>
        </div>

        <div class="results-actions">
          <button class="btn-primary" onclick="app.startQuiz()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
            重新測驗
          </button>
          <button class="btn-secondary" id="btn-retry-wrong" onclick="app.startQuiz(true)" style="display:none">
            重練錯題
          </button>
          <button class="btn-secondary" onclick="app.startReview()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="2" y="3" width="20" height="14" rx="2"/></svg>
            進入複習
          </button>
          <button class="btn-ghost" onclick="app.navigateTo('dashboard')">返回首頁</button>
        </div>
      </div>
    </div>
  </section>

  <!-- ── Review View ─────────────────────────────── -->
  <section class="view hidden" id="view-review">

    <div class="review-header">
      <button class="btn-back" onclick="app.navigateTo('category')">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        返回
      </button>
      <h2 class="review-title" id="review-title"></h2>
      <div class="view-toggle">
        <button class="toggle-btn active" id="btn-view-list" title="列表" onclick="app.setReviewMode('list')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
            <line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/>
            <line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
          </svg>
        </button>
        <button class="toggle-btn" id="btn-view-card" title="閃卡" onclick="app.setReviewMode('card')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="4" width="20" height="16" rx="3"/>
            <line x1="2" y1="10" x2="22" y2="10"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- List -->
    <div class="review-list" id="review-list"></div>

    <!-- Flashcard -->
    <div class="fc-wrap hidden" id="fc-wrap">
      <div class="fc-scene">
        <div class="flashcard" id="flashcard" onclick="app.flipCard()" role="button" aria-label="點擊翻轉">
          <!-- Front -->
          <div class="fc-face fc-front">
            <span class="fc-num" id="fc-num">Q1</span>
            <div class="fc-image-wrap hidden" id="fc-image-wrap">
              <div class="image-placeholder" id="fc-image-ph"></div>
            </div>
            <p class="fc-question" id="fc-question"></p>
            <span class="fc-hint">
              <svg class="fc-flip-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
              點擊翻轉 &nbsp;|&nbsp; 鍵盤：← → 切換，Space 翻轉
            </span>
          </div>
          <!-- Back -->
          <div class="fc-face fc-back">
            <div class="fc-opts" id="fc-opts"></div>
            <div class="fc-expl" id="fc-expl"></div>
          </div>
        </div>
      </div>

      <div class="fc-nav">
        <button class="btn-icon-lg" id="btn-fc-prev" onclick="app.prevCard()" title="上一張 ←">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <span class="fc-counter" id="fc-counter">1 / 10</span>
        <button class="btn-icon-lg" id="btn-fc-next" onclick="app.nextCard()" title="下一張 →">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"/></svg>
        </button>
      </div>
    </div>

  </section>

</main>

<script src="data/questions.js"></script>
<script src="data/questions_pdf.js"></script>
<script src="js/app.js"></script>
</body>
</html>
